<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>KimyGuide • Compare</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(18px); }
        to { opacity: 1; transform: translateY(0); }
      }

      @keyframes pulseSoft {
        0%, 100% { opacity: 0.55; transform: scale(1); }
        50% { opacity: 1; transform: scale(1.04); }
      }

      .fade-up { animation: fadeUp 0.7s ease-out both; }

      .glass {
        background: rgba(255,255,255,0.82);
        backdrop-filter: blur(16px);
      }

      .bg-grid {
        background:
          radial-gradient(circle at top left, rgba(59,130,246,0.12), transparent 28%),
          radial-gradient(circle at top right, rgba(99,102,241,0.10), transparent 24%),
          linear-gradient(180deg, #f8fbff 0%, #ffffff 100%);
      }

      .soft-dot { animation: pulseSoft 2.2s ease-in-out infinite; }
    </style>
  </head>

  <body class="min-h-screen bg-grid text-slate-900">
    <div class="max-w-7xl mx-auto px-4 py-8 md:py-10">
      <div class="glass border border-white/60 shadow-[0_20px_60px_rgba(15,23,42,0.08)] rounded-[2rem] p-5 md:p-7 fade-up">
        <div class="flex flex-col lg:flex-row lg:items-center lg:justify-between gap-6">
          <div class="flex-1 min-w-0">
            <div class="inline-flex items-center gap-3">
              <div class="w-12 h-12 rounded-2xl bg-blue-600 text-white flex items-center justify-center font-bold text-lg shadow-lg shadow-blue-200 shrink-0">
                K
              </div>
              <div class="min-w-0">
                <h1 class="text-3xl font-semibold tracking-tight">Compare Models</h1>
                <p class="text-slate-600 text-sm">
                  Side-by-side view of TF-IDF, Embedding, and Hybrid recommendations
                </p>
              </div>
            </div>

            <div class="mt-4 inline-flex items-center gap-2 px-3 py-1.5 rounded-full bg-slate-50 border border-slate-200 text-xs text-slate-600">
              <span class="w-2 h-2 rounded-full bg-emerald-500 soft-dot"></span>
              <span>{{ model_version }}</span>
            </div>
          </div>

          <div class="grid grid-cols-2 sm:grid-cols-4 gap-2 lg:flex lg:flex-nowrap lg:justify-end">
            <a
              class="min-w-[120px] text-center px-4 py-2.5 rounded-full text-sm border border-slate-200 hover:bg-white transition"
              href="/ui"
            >
              Recommend
            </a>
            <a
              class="min-w-[120px] text-center px-4 py-2.5 rounded-full text-sm border border-blue-200 bg-blue-50 text-blue-800 shadow-sm"
              href="/ui/compare"
            >
              Compare
            </a>
            <a
              class="min-w-[120px] text-center px-4 py-2.5 rounded-full text-sm border border-slate-200 hover:bg-white transition"
              href="/ui/eval"
            >
              Evaluate
            </a>
            <a
              class="min-w-[120px] text-center px-4 py-2.5 rounded-full text-sm border border-slate-200 hover:bg-white transition"
              href="/ui/dataset"
            >
              Dataset
            </a>
          </div>
        </div>
      </div>

      <div class="mt-8 glass border border-white/60 shadow-[0_18px_40px_rgba(15,23,42,0.06)] rounded-[2rem] p-5 md:p-6 fade-up">
        <div class="grid grid-cols-1 lg:grid-cols-[1fr_auto_auto] gap-3">
          <div>
            <label class="text-sm font-medium text-slate-700">Learning goal</label>
            <input
              id="goal"
              class="mt-2 w-full p-4 rounded-2xl bg-white/80 border border-slate-200 focus:outline-none focus:ring-4 focus:ring-blue-100 focus:border-blue-500 transition"
              placeholder="e.g., I want to learn deep learning and neural networks"
            />
          </div>

          <div>
            <label class="text-sm font-medium text-slate-700">Top K</label>
            <input
              id="k"
              type="number"
              value="5"
              min="1"
              max="10"
              class="mt-2 w-28 p-4 rounded-2xl bg-white/80 border border-slate-200 focus:outline-none focus:ring-4 focus:ring-blue-100 focus:border-blue-500 transition"
            />
          </div>

          <div class="flex items-end">
            <button
              id="run"
              class="w-full lg:w-auto px-6 py-4 rounded-2xl bg-blue-600 hover:bg-blue-700 text-white font-medium shadow-lg shadow-blue-200 transition hover:-translate-y-0.5"
            >
              Compare models
            </button>
          </div>
        </div>

        <div class="mt-4 flex items-center gap-3">
          <div id="compareLoader" class="hidden items-center gap-2 text-sm text-slate-500">
            <span class="w-2.5 h-2.5 rounded-full bg-blue-500 animate-pulse"></span>
            <span>Running model comparison…</span>
          </div>
          <p id="status" class="text-sm text-slate-600"></p>
        </div>
      </div>

      <div class="grid grid-cols-1 xl:grid-cols-3 gap-5 mt-8">
        <section class="fade-up">
          <div class="mb-3 flex items-center gap-2">
            <div class="w-2.5 h-2.5 rounded-full bg-slate-500"></div>
            <h2 class="font-semibold text-lg">TF-IDF</h2>
          </div>
          <div id="tfidf" class="space-y-4"></div>
        </section>

        <section class="fade-up" style="animation-delay: .08s;">
          <div class="mb-3 flex items-center gap-2">
            <div class="w-2.5 h-2.5 rounded-full bg-violet-500"></div>
            <h2 class="font-semibold text-lg">Embedding</h2>
          </div>
          <div id="embedding" class="space-y-4"></div>
        </section>

        <section class="fade-up" style="animation-delay: .16s;">
          <div class="mb-3 flex items-center gap-2">
            <div class="w-2.5 h-2.5 rounded-full bg-blue-600"></div>
            <h2 class="font-semibold text-lg">Hybrid</h2>
          </div>
          <div id="hybrid" class="space-y-4"></div>
        </section>
      </div>
    </div>

    <script src="/static/compare.js"></script>
  </body>
</html>
