<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>KimyGuide • Compare</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-white text-slate-900">
    <div class="max-w-6xl mx-auto px-4 py-10">
      <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4">
        <div>
          <h1 class="text-2xl font-semibold tracking-tight">Compare Models</h1>
          <p class="text-slate-600 text-sm">TF-IDF vs Embedding vs Hybrid • <span class="text-slate-900">{{ model_version }}</span></p>
        </div>
        <div class="flex flex-wrap gap-2">
          <a class="px-4 py-2 rounded-full text-sm border border-slate-200 hover:bg-slate-50" href="/ui">Recommend</a>
          <a class="px-4 py-2 rounded-full text-sm border border-slate-200 bg-blue-50 text-blue-800" href="/ui/compare">Compare</a>
          <a class="px-4 py-2 rounded-full text-sm border border-slate-200 hover:bg-slate-50" href="/ui/eval">Evaluate</a>
          <a class="px-4 py-2 rounded-full text-sm border border-slate-200 hover:bg-slate-50" href="/ui/dataset">Dataset</a>
        </div>
      </div>

      <div class="mt-8 bg-white border border-slate-200 rounded-2xl shadow-sm p-5">
        <label class="text-sm text-slate-600">Goal</label>
        <div class="flex flex-col md:flex-row gap-3 mt-2">
          <input id="goal" class="flex-1 p-3 rounded-xl bg-white border border-slate-300 focus:outline-none focus:ring-4 focus:ring-blue-100 focus:border-blue-600"
            placeholder="e.g., I want to learn deep learning and neural networks" />
          <input id="k" type="number" value="5" min="1" max="10"
            class="w-28 p-3 rounded-xl bg-white border border-slate-300 focus:outline-none focus:ring-4 focus:ring-blue-100 focus:border-blue-600" />
          <button id="run" class="px-4 py-3 rounded-xl bg-blue-600 hover:bg-blue-700 text-white font-medium shadow-sm">
            Compare
          </button>
        </div>
        <p id="status" class="mt-2 text-sm text-slate-600"></p>
      </div>

      <div class="grid grid-cols-1 lg:grid-cols-3 gap-4 mt-8">
        <div>
          <h2 class="font-semibold">TF-IDF</h2>
          <div id="tfidf" class="mt-3 space-y-3"></div>
        </div>
        <div>
          <h2 class="font-semibold">Embedding</h2>
          <div id="embedding" class="mt-3 space-y-3"></div>
        </div>
        <div>
          <h2 class="font-semibold">Hybrid</h2>
          <div id="hybrid" class="mt-3 space-y-3"></div>
        </div>
      </div>
    </div>

    <script src="/static/compare.js"></script>
  </body>
</html>
