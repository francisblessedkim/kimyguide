<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>KimyGuide • Evaluation</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

@keyframes fadeUp {
from {opacity:0; transform:translateY(20px);}
to {opacity:1; transform:translateY(0);}
}

.fade-up{
animation:fadeUp .7s ease-out both;
}

.glass{
background:rgba(255,255,255,0.86);
backdrop-filter:blur(16px);
}

.bg-grid{
background:
radial-gradient(circle at top left, rgba(59,130,246,.12), transparent 30%),
radial-gradient(circle at top right, rgba(99,102,241,.08), transparent 25%),
linear-gradient(180deg,#f8fbff 0%,#ffffff 100%);
}

</style>

</head>

<body class="min-h-screen bg-grid text-slate-900">

<div class="max-w-7xl mx-auto px-4 py-8 md:py-10">

<!-- HEADER -->
<div class="glass border border-white/60 shadow-[0_20px_60px_rgba(15,23,42,0.08)] rounded-[2rem] p-5 md:p-7 fade-up">

<div class="flex flex-col lg:flex-row lg:items-center lg:justify-between gap-6">

<div class="flex items-center gap-3">

<div class="w-12 h-12 rounded-2xl bg-blue-600 text-white flex items-center justify-center font-bold text-lg shadow-lg shadow-blue-200">
K
</div>

<div>
<h1 class="text-3xl font-semibold tracking-tight">
Evaluation Dashboard
</h1>

<p class="text-slate-600 text-sm">
Recommender system evaluation metrics
</p>
</div>

</div>

<div class="grid grid-cols-2 sm:grid-cols-4 gap-2 lg:flex lg:flex-nowrap lg:justify-end">

<a class="min-w-[120px] text-center px-4 py-2.5 rounded-full text-sm border border-slate-200 hover:bg-white transition" href="/ui">
Recommend
</a>

<a class="min-w-[120px] text-center px-4 py-2.5 rounded-full text-sm border border-slate-200 hover:bg-white transition" href="/ui/compare">
Compare
</a>

<a class="min-w-[120px] text-center px-4 py-2.5 rounded-full text-sm border border-blue-200 bg-blue-50 text-blue-800 shadow-sm" href="/ui/eval">
Evaluate
</a>

<a class="min-w-[120px] text-center px-4 py-2.5 rounded-full text-sm border border-slate-200 hover:bg-white transition" href="/ui/dataset">
Dataset
</a>

</div>

</div>

</div>

<!-- CONTROLS -->
<div class="mt-8 glass border border-white/60 shadow-[0_18px_40px_rgba(15,23,42,0.06)] rounded-[2rem] p-6 fade-up">

<div class="grid grid-cols-1 md:grid-cols-5 gap-4">

<div>
<label class="text-sm text-slate-600">#Queries (10–300)</label>
<input id="nq" type="number" value="60" min="10" max="300"
class="mt-1 w-full p-3 rounded-xl bg-white border border-slate-300 focus:outline-none focus:ring-4 focus:ring-blue-100 focus:border-blue-600">
</div>

<div>
<label class="text-sm text-slate-600">K (3–20)</label>
<input id="k" type="number" value="10" min="3" max="20"
class="mt-1 w-full p-3 rounded-xl bg-white border border-slate-300 focus:outline-none focus:ring-4 focus:ring-blue-100 focus:border-blue-600">
</div>

<div>
<label class="text-sm text-slate-600">Evaluation mode</label>
<select id="mode"
class="mt-1 w-full p-3 rounded-xl bg-white border border-slate-300 focus:outline-none focus:ring-4 focus:ring-blue-100 focus:border-blue-600">

<option value="sanity">Sanity (self retrieval)</option>
<option value="subject" selected>Proxy relevance</option>
<option value="desc">Harder (description queries)</option>

</select>
</div>

<div>
<label class="text-sm text-slate-600">K-sweep metric</label>
<select id="sweepMetric"
class="mt-1 w-full p-3 rounded-xl bg-white border border-slate-300 focus:outline-none focus:ring-4 focus:ring-blue-100 focus:border-blue-600">

<option value="mrr" selected>MRR</option>
<option value="recall">Recall</option>
<option value="ndcg">nDCG</option>

</select>
</div>

<div class="flex items-end">
<button id="run"
class="w-full px-4 py-3 rounded-xl bg-blue-600 hover:bg-blue-700 text-white font-medium shadow-sm">
Run evaluation
</button>
</div>

</div>

<div class="flex items-center gap-3 mt-4">

<div id="inlineLoader" class="hidden items-center gap-2 text-sm text-slate-500">
<span class="w-2.5 h-2.5 rounded-full bg-blue-500 animate-pulse"></span>
Running evaluation…
</div>

<p id="status" class="text-sm text-slate-600"></p>

</div>

</div>

<!-- STAT CARDS -->
<div class="grid grid-cols-1 md:grid-cols-4 gap-4 mt-6 fade-up">

<div class="glass border border-white/60 rounded-[1.6rem] p-5 shadow-sm">
<div class="text-xs uppercase tracking-wide text-slate-400 font-semibold">
Queries
</div>
<div id="statQueries" class="mt-2 text-3xl font-semibold tracking-tight">—</div>
</div>

<div class="glass border border-white/60 rounded-[1.6rem] p-5 shadow-sm">
<div class="text-xs uppercase tracking-wide text-slate-400 font-semibold">
K
</div>
<div id="statK" class="mt-2 text-3xl font-semibold tracking-tight">—</div>
</div>

<div class="glass border border-white/60 rounded-[1.6rem] p-5 shadow-sm">
<div class="text-xs uppercase tracking-wide text-slate-400 font-semibold">
Dataset size
</div>
<div id="statDataset" class="mt-2 text-3xl font-semibold tracking-tight">—</div>
</div>

<div class="glass border border-white/60 rounded-[1.6rem] p-5 shadow-sm">
<div class="text-xs uppercase tracking-wide text-slate-400 font-semibold">
Mode
</div>
<div id="statMode" class="mt-2 text-xl font-semibold tracking-tight">—</div>
</div>

</div>

<!-- RESULTS -->
<div class="mt-6 glass border border-white/60 rounded-[2rem] shadow-sm p-6 fade-up">

<div class="flex flex-col md:flex-row md:items-center md:justify-between gap-2">

<div>
<h2 class="text-lg font-semibold tracking-tight">
Results
</h2>

<div id="meta" class="text-sm text-slate-600 mt-1"></div>

</div>

</div>

<!-- CHARTS -->

<div class="mt-5 grid grid-cols-1 lg:grid-cols-2 gap-5">

<div class="border border-slate-200 rounded-2xl p-4">
<div class="text-sm font-medium text-slate-700">
Mean ranking metrics
</div>

<canvas id="barMetrics" height="160"></canvas>
</div>

<div class="border border-slate-200 rounded-2xl p-4">
<div class="text-sm font-medium text-slate-700">
K-sweep robustness
</div>

<canvas id="lineSweep" height="160"></canvas>
</div>

</div>

<!-- TABLE -->

<div class="mt-6 overflow-x-auto">

<table class="w-full text-sm">

<thead class="text-slate-600">

<tr class="border-b border-slate-200">

<th class="text-left py-3 px-4 font-medium">Model</th>
<th class="text-left py-3 px-4 font-medium">MRR@K</th>
<th class="text-left py-3 px-4 font-medium">Recall@K</th>
<th class="text-left py-3 px-4 font-medium">nDCG@K</th>
<th class="text-left py-3 px-4 font-medium">Coverage</th>
<th class="text-left py-3 px-4 font-medium">Diversity</th>

</tr>

</thead>

<tbody id="tbody"></tbody>

</table>

</div>

</div>

</div>

<!-- LOADING OVERLAY -->

<div id="evalOverlay"
class="hidden fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 flex items-center justify-center">

<div class="bg-white rounded-2xl p-8 shadow-xl text-center max-w-md">

<div class="w-12 h-12 border-4 border-blue-600 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>

<div id="overlayText" class="text-sm text-slate-600">
Running evaluation...
</div>

</div>

</div>

<script src="/static/eval.js"></script>

</body>
</html>
