<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>KimyGuide • Dataset</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>

  <body class="bg-white text-slate-900">
    <div class="max-w-6xl mx-auto px-4 py-10">
      <!-- Header -->
      <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4">
        <div>
          <h1 class="text-2xl font-semibold tracking-tight">Dataset</h1>
          <p class="text-slate-600 text-sm">
            OpenLearn curated dataset • <span class="text-slate-900">{{ model_version }}</span>
          </p>
        </div>
        <div class="flex flex-wrap gap-2">
          <a class="px-4 py-2 rounded-full text-sm border border-slate-200 hover:bg-slate-50" href="/ui">Recommend</a>
          <a class="px-4 py-2 rounded-full text-sm border border-slate-200 hover:bg-slate-50" href="/ui/compare">Compare</a>
          <a class="px-4 py-2 rounded-full text-sm border border-slate-200 hover:bg-slate-50" href="/ui/eval">Evaluate</a>
          <a class="px-4 py-2 rounded-full text-sm border border-slate-200 bg-blue-50 text-blue-800" href="/ui/dataset">Dataset</a>
        </div>
      </div>

      <!-- Content -->
      <div class="mt-8 bg-white border border-slate-200 rounded-2xl shadow-sm p-5">
        <div class="text-sm text-slate-700 space-y-1">
          <div>Rows: <span class="text-slate-900 font-medium">{{ num_courses }}</span></div>
          <div class="break-all">Path: <span class="text-slate-900 font-medium">{{ dataset_path }}</span></div>
        </div>

        <div class="flex flex-col md:flex-row md:items-center gap-3 mt-5">
          <div class="flex items-center gap-3">
            <input
              id="limit"
              type="number"
              value="50"
              min="1"
              max="200"
              class="w-28 p-2.5 rounded-xl bg-white border border-slate-300 focus:outline-none focus:ring-4 focus:ring-blue-100 focus:border-blue-600"
            />
            <button id="load" class="px-4 py-2.5 rounded-xl bg-blue-600 hover:bg-blue-700 text-white font-medium shadow-sm">
              Load sample
            </button>
          </div>
          <p id="status" class="text-sm text-slate-600"></p>
        </div>

        <div class="mt-5 overflow-x-auto">
          <table class="w-full text-sm">
            <thead class="text-slate-600">
              <tr class="border-b border-slate-200">
                <th class="text-left py-3 font-medium">Title</th>
                <th class="text-left py-3 font-medium">Subject</th>
                <th class="text-left py-3 font-medium">Level</th>
                <th class="text-left py-3 font-medium">Link</th>
              </tr>
            </thead>
            <tbody id="tbody" class="text-slate-900"></tbody>
          </table>
        </div>
      </div>

      <div class="mt-10 text-xs text-slate-500">
        Built by Kimy • CM3005 Data Science • <a class="text-blue-700 hover:text-blue-800" href="/docs">API Docs</a>
      </div>
    </div>

    <script src="/static/dataset.js"></script>
  </body>
</html>
