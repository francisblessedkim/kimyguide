<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>KimyGuide • Recommend</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>

  <body class="bg-white text-slate-900">
    <div class="max-w-6xl mx-auto px-4 py-10">
      <!-- Header -->
      <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4">
        <div>
          <div class="flex items-center gap-3">
            <div class="h-10 w-10 rounded-2xl bg-blue-600 flex items-center justify-center text-white font-semibold">K</div>
            <div>
              <h1 class="text-2xl font-semibold tracking-tight">KimyGuide</h1>
              <p class="text-slate-600 text-sm">Goal-based cold-start recommender • <span class="text-slate-900">{{ model_version }}</span></p>
            </div>
          </div>
        </div>

        <!-- Nav -->
        <div class="flex flex-wrap gap-2">
          <a class="px-4 py-2 rounded-full text-sm border border-slate-200 bg-blue-50 text-blue-800" href="/ui">Recommend</a>
          <a class="px-4 py-2 rounded-full text-sm border border-slate-200 hover:bg-slate-50" href="/ui/compare">Compare</a>
          <a class="px-4 py-2 rounded-full text-sm border border-slate-200 hover:bg-slate-50" href="/ui/eval">Evaluate</a>
          <a class="px-4 py-2 rounded-full text-sm border border-slate-200 hover:bg-slate-50" href="/ui/dataset">Dataset</a>
        </div>
      </div>

      <!-- Main -->
      <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mt-8">
        <!-- Inputs -->
        <div class="lg:col-span-1 bg-white border border-slate-200 rounded-2xl shadow-sm p-5">
          <h2 class="text-lg font-semibold tracking-tight">Your learning goal</h2>
          <p class="text-slate-600 text-sm mt-1">Describe what you want to learn — we’ll recommend courses even with no user history.</p>

          <textarea
            id="goal"
            class="mt-4 w-full h-28 p-3 rounded-xl bg-white border border-slate-300 focus:outline-none focus:ring-4 focus:ring-blue-100 focus:border-blue-600"
            placeholder="e.g., I want to learn data science"
          ></textarea>

          <div class="grid grid-cols-2 gap-3 mt-4">
            <div>
              <label class="text-sm text-slate-600">Model</label>
              <select id="model" class="mt-1 w-full p-2.5 rounded-xl bg-white border border-slate-300 focus:outline-none focus:ring-4 focus:ring-blue-100 focus:border-blue-600">
                <option value="hybrid" selected>Hybrid (recommended)</option>
                <option value="embedding">Embedding</option>
                <option value="tfidf">TF-IDF (baseline)</option>
              </select>
            </div>
            <div>
              <label class="text-sm text-slate-600">Top K</label>
              <input id="k" type="number" value="5" min="1" max="20"
                class="mt-1 w-full p-2.5 rounded-xl bg-white border border-slate-300 focus:outline-none focus:ring-4 focus:ring-blue-100 focus:border-blue-600"/>
            </div>
          </div>

          <div class="grid grid-cols-2 gap-3 mt-4">
            <div>
              <label class="text-sm text-slate-600">Candidates</label>
              <input id="cand" type="number" value="200" min="20" max="1000"
                class="mt-1 w-full p-2.5 rounded-xl bg-white border border-slate-300 focus:outline-none focus:ring-4 focus:ring-blue-100 focus:border-blue-600"/>
              <p class="text-xs text-slate-500 mt-1">Used for embedding/hybrid retrieval.</p>
            </div>

            <div class="flex items-end">
              <label class="inline-flex items-center gap-2 cursor-pointer select-none">
                <input id="explain" type="checkbox" checked class="h-4 w-4 rounded border-slate-300 text-blue-600 focus:ring-blue-200"/>
                <span class="text-sm text-slate-700">Explain results</span>
              </label>
            </div>
          </div>

          <button id="run"
            class="mt-5 w-full px-4 py-3 rounded-xl bg-blue-600 hover:bg-blue-700 text-white font-medium shadow-sm">
            Recommend
          </button>

          <p id="status" class="mt-3 text-sm text-slate-600"></p>
        </div>

        <!-- Results -->
        <div class="lg:col-span-2">
          <div class="flex items-center justify-between">
            <h2 class="text-lg font-semibold tracking-tight">Recommendations</h2>
            <span id="mv" class="text-sm text-slate-500"></span>
          </div>

          <div id="results" class="mt-4 grid grid-cols-1 gap-4"></div>
        </div>
      </div>
    </div>

    <script src="/static/ui.js"></script>
  </body>
</html>
